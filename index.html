<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Green Circle</title>
    <!-- Подключаем Pyodide (Python в браузере) -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            background-color: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #ai-circle {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #00ff00 0%, #008000 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
            transition: all 0.3s ease;
        }

        #ai-circle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.6);
        }

        #ai-circle.active {
            animation: pulse 1s infinite alternate;
            background: #00ff00;
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 30px rgba(0, 255, 0, 0.4); }
            to { transform: scale(1.1); box-shadow: 0 0 60px rgba(0, 255, 0, 0.8); }
        }

        #status {
            margin-top: 30px;
            font-size: 18px;
            height: 24px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div id="ai-circle"></div>
    <div id="status">Загрузка системы...</div>

    <script>
        const circle = document.getElementById('ai-circle');
        const statusText = document.getElementById('status');
        
        // Ссылка на ваш raw файл в GitHub
        // ЗАМЕНИТЕ ЭТУ ССЫЛКУ НА ВАШУ
        const GITHUB_RAW_URL = "https://githubusercontent.com";

        let pyodide;

        // Запуск Python окружения
        async function init() {
            pyodide = await loadPyodide();
            statusText.innerText = "Готов к работе. Нажми на круг.";
        }
        init();

        // Настройка микрофона
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            statusText.innerText = "Ваш браузер не поддерживает голос.";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';

            circle.onclick = () => {
                recognition.start();
                circle.classList.add('active');
                statusText.innerText = "Слушаю...";
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                statusText.innerText = "Думаю...";
                
                await runAiLogic(transcript);
                
                circle.classList.remove('active');
            };

            recognition.onerror = () => {
                circle.classList.remove('active');
                statusText.innerText = "Ошибка записи.";
            };
        }

        // Загрузка кода с GitHub и выполнение
        async function runAiLogic(userInput) {
            try {
                // Скачиваем свежий код app.py
                const response = await fetch(GITHUB_RAW_URL);
                const pyCode = await response.text();

                // Передаем ввод пользователя в Python
                pyodide.globals.set("user_input", userInput);
                
                // Выполняем скрипт
                await pyodide.runPythonAsync(pyCode);
                
                // Получаем результат
                const responseText = pyodide.globals.get("result");
                statusText.innerText = "ИИ: " + responseText;
                
                // Проговариваем ответ голосом
                const utterance = new SpeechSynthesisUtterance(responseText);
                utterance.lang = 'ru-RU';
                window.speechSynthesis.speak(utterance);

            } catch (err) {
                console.error(err);
                statusText.innerText = "Ошибка в app.py на GitHub";
            }
        }
    </script>
</body>
</html>
